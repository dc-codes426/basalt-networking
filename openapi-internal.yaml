openapi: 3.1.0
info:
  title: basalt-networking (internal)
  description: |
    Internal-facing API for basalt-networking, accessible only within the
    Docker network on port 8080. Provides a health check endpoint used by
    basalt-admin-internal to monitor service liveness.
  version: 0.1.0

servers:
  - url: http://networking:8080
    description: Docker internal network

paths:
  /health:
    get:
      summary: Liveness check
      description: |
        Simple liveness probe that returns `ok` when the service is running.
        Called by basalt-admin-internal as part of its dependency health checks.
      operationId: health
      responses:
        "200":
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
                const: ok
