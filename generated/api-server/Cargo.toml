[package]
name = "basalt-networking-api-server"
version = "0.1.0"
edition = "2024"

[features]
default = ["server"]
server = []

[dependencies]
ammonia = "4"
async-trait = "0.1"
axum = { version = "0.8", features = ["multipart"] }
axum-extra = { version = "0.12", features = ["cookie", "query", "typed-header"] }
base64 = "0.22"
bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
headers = "0.4"
http = "1"
http-body-util = "0.1"
lazy_static = "1"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_html_form = "0.2"
serde_json = { version = "1", features = ["raw_value"] }
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tracing = { version = "0.1", features = ["attributes"] }
uuid = { version = "1", features = ["serde"] }
validator = { version = "0.20", features = ["derive"] }
